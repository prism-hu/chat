model_list:
  - model_name: claude-opus-4-6
    litellm_params:
      model: anthropic/claude-opus-4-6
      api_key: os.environ/CLAUDE_OAUTH_TOKEN

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/CLAUDE_OAUTH_TOKEN

  # --- vLLM custom build (DGX Spark SM121), served by the vllm-qwen35 service ---
  # NOTE: Ollama models are intentionally NOT registered here — OpenWebUI talks to
  # Ollama directly (OLLAMA_BASE_URL), so listing them in LiteLLM too would show
  # each model twice in the UI. Trade-off: the external :4000 API now exposes only
  # Claude + this custom vLLM (not the Ollama models).
  - model_name: qwen3.5-122b-custom
    litellm_params:
      model: openai/qwen
      api_base: http://vllm-qwen35:8000/v1
      api_key: dummy

litellm_settings:
  drop_params: true
