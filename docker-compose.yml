services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    environment:
      - OLLAMA_BASE_URL=http://172.28.0.1:11434
      - DEFAULT_LOCALE=ja-JP
      - WEBUI_URL=https://chat.prism-hu.org
      - WEBUI_SHOW_UPDATE_NOTIFICATION=false
      - ENABLE_FOLLOW_UP_GENERATION=false
      - OPENAI_API_BASE_URL=http://litellm:4000/v1
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY}
    ports:
      - "8080:8080"
    volumes:
      - open-webui:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - litellm
    restart: always

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm
    ports:
      - "4000:4000"
    command: ["--config", "/app/litellm/config.yaml"]
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - CLAUDE_OAUTH_TOKEN=${CLAUDE_OAUTH_TOKEN}
      - DISABLE_SPEND_LOGS=True
      - LITELLM_MODE=DEV
    volumes:
      - ./litellm:/app/litellm
    restart: always

  # Qwen3.5-122B-A10B (INT4+FP8 hybrid, MTP-2) served by vLLM, optimized for
  # the DGX Spark (SM121). See vendor/qwen35-spark (git submodule) and README.
  # Requires a one-time host bootstrap (install.sh Steps 0-3) — see README.
  vllm-qwen35:
    # Pulled from GHCR (built on the DGX Spark, pushed to prism-hu). Rebuild only
    # if needed: vendor/qwen35-spark/install.sh, then docker push (see docs).
    image: ${VLLM_QWEN35_IMAGE:-ghcr.io/prism-hu/vllm-qwen35-v2:latest}
    pull_policy: missing
    container_name: vllm-qwen35
    ipc: host
    volumes:
      - ${MODELS_DIR:-./models}:/models
    command:
      - serve
      - ${QWEN_MODEL_PATH:-/models/qwen35-122b-hybrid-int4fp8}
      - --served-model-name=qwen
      - --port=8000
      - --max-model-len=262144
      - --gpu-memory-utilization=0.85
      - --reasoning-parser=qwen3
      - --attention-backend=FLASHINFER
      - '--speculative-config={"method":"mtp","num_speculative_tokens":2}'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: always

volumes:
  open-webui:

networks:
  default:
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1
